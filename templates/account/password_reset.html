<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Reset Password | InvoiceFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; }
        .django-form p { margin-bottom: 1.5rem; display: flex; flex-direction: column; }
        .django-form label { 
            font-size: 0.75rem; 
            font-weight: 700; 
            color: #94a3b8; 
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .django-form input { 
            width: 100%; 
            padding: 0.875rem 1rem; 
            border: 1px solid #334155; 
            border-radius: 12px; 
            background-color: #1e293b;
            color: #f8fafc;
            font-size: 0.95rem;
        }
        .django-form input:focus { outline: none; border-color: #6366f1; background-color: #0f172a; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 text-white">

    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-600/20 rounded-full blur-[120px]"></div>
    </div>

    <div class="max-w-md w-full bg-[#1e293b]/50 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl border border-slate-800 text-center">
        <h2 class="text-3xl font-extrabold mb-2">Password Reset</h2>
        <p class="text-slate-400 mb-8 font-medium">
            Enter your email below, and we'll send you a link to get back into your account.
        </p>

        <form class="django-form text-left" method="post" action="{% url 'account_reset_password' %}">
            {% csrf_token %}
            
            <div class="mb-6">
                <label for="id_email">Email Address</label>
                <input type="email" name="email" id="id_email" placeholder="thishya@example.com" required>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-500 transition-all shadow-lg shadow-indigo-500/25 mt-2">
                Send Reset Link
            </button>
        </form>

        <div class="mt-8">
            <a href="{% url 'account_login' %}" class="text-slate-400 text-sm hover:text-white transition">← Back to Login</a>
        </div>
    </div>
</body>
</html>
