<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Invoice | InvoiceFlow</title>

<style>
:root {
    --primary: #6366f1;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f8fafc;
    --text-dim: #94a3b8;
    --border: #334155;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 16px;
}

.container {
    max-width: 900px;
    margin: auto;
    background: var(--card);
    padding: 20px;
    border-radius: 16px;
    border: 1px solid var(--border);
}

/* HEADER */
header {
    margin-bottom: 20px;
}
h2 { margin: 0; }
p { color: var(--text-dim); }

/* FORM */
.form-group { margin-bottom: 16px; }

label {
    font-size: 13px;
    color: var(--text-dim);
    display: block;
    margin-bottom: 6px;
}

input, select {
    width: 100%;
    padding: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: white;
}

/* GRID */
.row {
    display: grid;
    gap: 12px;
}
@media(min-width:768px){
    .row { grid-template-columns: 1fr 1fr; }
}

/* ITEMS */
.item-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: rgba(255,255,255,0.03);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}

@media(min-width:768px){
    .item-row {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr auto;
        align-items: center;
    }
}

/* BUTTONS */
.btn {
    padding: 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.btn-primary {
    background: var(--primary);
    color: white;
    width: 100%;
    font-weight: bold;
}

.btn-add {
    border: 1px dashed var(--primary);
    color: var(--primary);
    background: transparent;
    width: 100%;
}

.btn-remove {
    background: #ef4444;
    color: white;
}

/* PRO BADGE */
.badge {
    font-size: 10px;
    background: gold;
    color: black;
    padding: 2px 6px;
    border-radius: 4px;
}
</style>
</head>

<body>

<div class="container">
<header>
    <h2>Create Invoice</h2>
    <p>Create invoice & get paid faster ⚡</p>
</header>

<form method="POST">
{% csrf_token %}

<!-- CLIENT -->
<div class="row">
    <div class="form-group">
        <label>Client Name</label>
        <input type="text" name="client_name" required>
    </div>

    <div class="form-group">
        <label>Due Date</label>
        <input type="date" name="due_date">
    </div>
</div>

<!-- TEMPLATE -->
<div class="form-group">
    <label>
        Template 
        {% if not user.is_premium %}<span class="badge">PRO</span>{% endif %}
    </label>

    <select name="template">
        <option value="minimal">Minimal (Free)</option>

        {% if user.is_premium %}
            <option value="gst">GST Invoice</option>
            <option value="premium">Premium</option>
        {% else %}
            <option disabled>GST Invoice (Pro)</option>
            <option disabled>Premium (Pro)</option>
        {% endif %}
    </select>
</div>

<!-- PAYMENT LINK -->
<div class="form-group">
    <label>
        Payment Link 
        {% if not user.is_premium %}<span class="badge">PRO</span>{% endif %}
    </label>

    <input type="url" name="payment_link"
        {% if not user.is_premium %}readonly placeholder="Upgrade to add payment link"{% endif %}>
</div>

<!-- TAX -->
<div class="form-group">
    <label>
        Tax %
        {% if not user.is_premium %}<span class="badge">PRO</span>{% endif %}
    </label>

    <input 
    type="number" 
    name="tax_percentage"
    min="0"
    step="0.01"
    value="0"
    {% if not user.is_premium %}readonly class="readonly-field"{% endif %}
>
</div>

<!-- ITEMS -->
<div id="items">
    <div class="item-row">
        <input name="desc[]" placeholder="Description" required>
        <input name="qty[]" type="number" value="1">
        <input name="price[]" type="number" step="0.01" placeholder="0.00">
        <button type="button" class="btn btn-remove" onclick="removeItem(this)">✕</button>
    </div>
</div>

<button type="button" class="btn btn-add" onclick="addItem()">+ Add Item</button>

<button type="submit" class="btn btn-primary">Generate Invoice</button>

</form>
</div>

<script>
function addItem() {
    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML = `
        <input name="desc[]" placeholder="Description" required>
        <input name="qty[]" type="number" value="1">
        <input name="price[]" type="number" step="0.01">
        <button type="button" class="btn btn-remove" onclick="removeItem(this)">✕</button>
    `;
    document.getElementById('items').appendChild(div);
}

function removeItem(btn) {
    btn.parentElement.remove();
}
</script>

</body>
</html>
