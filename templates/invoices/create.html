<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Create Invoice | InvoiceFlow</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --accent: #10b981;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }

        header {
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        h2 { margin: 0; font-size: 28px; letter-spacing: -0.5px; }
        p { color: var(--text-dim); margin: 8px 0 0; }

        .form-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; color: var(--text-dim); }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            transition: border 0.2s;
        }

        input:focus { outline: none; border-color: var(--primary); }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .items-header {
            display: grid;
            grid-template-columns: 2fr 0.6fr 1fr 0.4fr;
            gap: 15px;
            margin-bottom: 10px;
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .item-row {
            display: grid;
            grid-template-columns: 2fr 0.6fr 1fr 0.4fr;
            gap: 15px;
            margin-bottom: 12px;
            align-items: center;
        }

        .btn {
            cursor: pointer;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.2s;
            border: none;
            display: inline-block;
        }

        .btn-primary { background: var(--primary); color: white; width: 100%; font-size: 16px; margin-top: 20px; }
        .btn-primary:hover { background: var(--primary-hover); }

        .btn-add {
            background: transparent;
            color: var(--primary);
            border: 1px dashed var(--primary);
            margin-bottom: 20px;
        }
        .btn-add:hover { background: rgba(99, 102, 241, 0.1); }

        .btn-remove { background: #ef4444; color: white; padding: 8px; font-size: 12px; border-radius: 4px; }

        .badge-pro {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .readonly-field { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Create New Invoice</h2>
        <p>Fill in the details to generate your professional invoice.</p>
    </header>

    <form method="POST" id="invoice-form">
        {% csrf_token %}
        
        <div class="row">
            <div class="form-group">
                <label>Client Name</label>
                <input type="text" name="client_name" placeholder="e.g. Acme Corp" required>
            </div>
            <div class="form-group">
                <label>
                    Tax Percentage (%) 
                    {% if not user.is_premium %}<span class="badge-pro">PRO ONLY</span>{% endif %}
                </label>
                <input type="number" name="tax_percentage" 
                       {% if not user.is_premium %}class="readonly-field" readonly value="0"
                       {% else %}placeholder="18"{% endif %}>
            </div>
        </div>

        <div class="items-header">
            <span>Description</span>
            <span>Qty</span>
            <span>Unit Price</span>
            <span></span>
        </div>

        <div id="item-container">
            <div class="item-row">
                <input type="text" name="desc[]" placeholder="Consulting Services" required>
                <input type="number" name="qty[]" value="1" min="1" required>
                <input type="number" step="0.01" name="price[]" placeholder="500.00" required>
                <button type="button" class="btn btn-remove" onclick="this.parentElement.remove()">✕</button>
            </div>
        </div>

        <button type="button" class="btn btn-add" onclick="addItem()">+ Add Line Item</button>

        <button type="submit" class="btn btn-primary">Generate & Save Invoice</button>
    </form>
</div>

<script>
    function addItem() {
        const container = document.getElementById('item-container');
        const div = document.createElement('div');
        div.className = 'item-row';
        div.innerHTML = `
            <input type="text" name="desc[]" placeholder="Item description" required>
            <input type="number" name="qty[]" value="1" min="1" required>
            <input type="number" step="0.01" name="price[]" placeholder="0.00" required>
            <button type="button" class="btn btn-remove" onclick="this.parentElement.remove()">✕</button>
        `;
        container.appendChild(div);
    }
</script>

</body>
</html>
